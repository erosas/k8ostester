# Keeps the pinned/hardened surface current: GitHub Actions, the workspace python
# deps (uv, at the root), and the loadgen image base digest. One PR per ecosystem.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /                                   # the uv workspace root
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  # Image bases (cgr.dev/chainguard/wolfi-base): re-digest daily so Chainguard's
  # continuous rebuilds — and their CVE fixes — land fast. Both the loadgen and
  # the console image build on the pinned wolfi-base.
  - package-ecosystem: docker
    directory: /pg/loadgen                         # pg/loadgen/loadgen.Dockerfile
    schedule:
      interval: daily
  - package-ecosystem: docker
    directory: /pg                                 # pg/console.Dockerfile
    schedule:
      interval: daily
