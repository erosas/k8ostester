# Keeps the pinned/hardened surface current so it doesn't rot silently:
# GitHub Actions, the python deps (uv), and the base-image digests in both
# Dockerfiles. Grouped into one PR per ecosystem to cut noise.
#
# NOTE: kubectl and helm come from Wolfi's apk repo (not a FROM/ARG), so they
# ride the base-image digest bumps below — no manual version tracking needed.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /k8ostester-core
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  # Base image (cgr.dev/chainguard/wolfi-base, shared by both Dockerfiles):
  # re-digest daily so Chainguard's continuous rebuilds — the whole point of the
  # Wolfi base — land fast. The python runtime is a floating apk package
  # (`python-3.14`), so it already picks up patches at build time.
  - package-ecosystem: docker
    directory: /k8ostester-core                    # tool image base digest
    schedule:
      interval: daily

  - package-ecosystem: docker
    directory: /k8ostester-core/src/k8ostester/technologies/postgres_cnpg   # loadgen base digest
    schedule:
      interval: daily
