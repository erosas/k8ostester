# Keeps the pinned/hardened surface current: GitHub Actions, the workspace python
# deps (uv, at the root), and the loadgen image base digest. One PR per ecosystem.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /                                   # the uv workspace root
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  # Loadgen image base (cgr.dev/chainguard/wolfi-base): re-digest daily so
  # Chainguard's continuous rebuilds land fast.
  - package-ecosystem: docker
    directory: /pg/loadgen
    schedule:
      interval: daily
