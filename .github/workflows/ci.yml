# Test gate: ruff + the full suite, and a Trivy scan that fails on fixable
# HIGH/CRITICAL vulns, on every push/PR. The e2e job spins a real kind cluster
# and runs the framework end to end — heavier, so nightly + manual only (CNPG
# experiments need more than a GitHub-hosted runner; nginx-smoke proves the
# deploy/verify/teardown lifecycle).
name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"   # nightly e2e
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: k8ostester-core
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest -q

  # Build both images (single-arch, for the runner) and fail on any fixable
  # HIGH/CRITICAL vuln. ignore-unfixed avoids blocking on CVEs with no upstream
  # patch yet. Mirrors the two build contexts in release.yml.
  scan:
    name: scan (${{ matrix.name }})   # stable check name (not the full matrix tuple)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: k8os-tester
            context: k8ostester-core
            dockerfile: k8ostester-core/Dockerfile
          - name: k8os-loadgen
            context: k8ostester-core/src/k8ostester/technologies/postgres_cnpg
            dockerfile: k8ostester-core/src/k8ostester/technologies/postgres_cnpg/loadgen.Dockerfile
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true                       # into the local daemon, not pushed
          tags: ${{ matrix.name }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.name }}:scan
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

  # Regenerate the coverage badge on every push to main and force-push it to a
  # single-commit `badges` branch (referenced by the README). Self-contained —
  # no external coverage service. Only runs post-merge, so it never gates a PR.
  coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Generate badge
        working-directory: k8ostester-core
        run: |
          uv sync
          uv run pytest --cov=k8ostester --cov-report=xml -q
          uv run --with 'genbadge[coverage]' genbadge coverage -i coverage.xml -o ../coverage.svg
      - name: Publish to badges branch
        run: |
          cp coverage.svg "$RUNNER_TEMP/coverage.svg"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan badges
          git rm -rf . >/dev/null 2>&1 || true
          cp "$RUNNER_TEMP/coverage.svg" coverage.svg
          git add -f coverage.svg
          git commit -m "coverage badge"
          git push -f origin badges

  e2e:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - uses: helm/kind-action@v1          # a real cluster on the runner
        with:
          install_only: true
      - run: kind create cluster --name k8ost-e2e
      - name: smoke — deploy, verify, teardown a real workload
        run: |
          uv --project k8ostester-core run k8ost run \
            experiments/generic/01-nginx-smoke --view plain --context kind-k8ost-e2e
