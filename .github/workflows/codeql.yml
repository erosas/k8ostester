# CodeQL static analysis of the Python source — complements the Trivy gate
# (which scans dependencies/images) by scanning our own code. Findings surface
# in the repo's Security tab. Runs on push/PR to main and weekly.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
