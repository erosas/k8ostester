# Publish the two images we own, multi-arch (amd64 + arm64), on a version tag.
#
#   <namespace>/k8os-tester   — the tool (CLI/TUI, kubectl + helm baked in)
#   <namespace>/k8os-loadgen  — the app-perspective load generator
#
# Both get :<version> (from the tag, minus the leading v) and :latest.
#
# External users behind an Artifactory/Nexus proxy mirror these two paths and
# point the framework at the mirror — see README "Running through a mirror".
#
# Setup (once, in repo → Settings → Secrets and variables → Actions → Secrets):
#   DOCKERHUB_NAMESPACE  the Docker Hub org/account the images live under
#   DOCKERHUB_USERNAME   the account used to log in (an org member with push)
#   DOCKERHUB_TOKEN      that account's Docker Hub access token (not password)
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without leading v), e.g. 0.1.0"
        required: true

jobs:
  images:
    runs-on: ubuntu-latest
    env:
      NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
    strategy:
      matrix:
        include:
          - name: k8os-tester
            context: .
            dockerfile: k8ostester-core/Dockerfile
          - name: k8os-loadgen
            context: pg/loadgen
            dockerfile: pg/loadgen/loadgen.Dockerfile
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v4      # arm64 emulation for the build
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.NAMESPACE }}/${{ matrix.name }}:${{ steps.v.outputs.version }}
            ${{ env.NAMESPACE }}/${{ matrix.name }}:latest
          sbom: true                 # attach a signed bill-of-materials
          provenance: mode=max       # + full build provenance (SLSA)
          cache-from: type=gha
          cache-to: type=gha,mode=max
