# Config-variant of 06-cnpg-ha-pooler-storm (same group → same graphs):
# identical architecture, identical load/fault/goals — only PgBouncer
# parameters differ. The original failed with RTO 15.0s, which matches
# PgBouncer's default server_login_retry=15s exactly; this arm tunes the
# failover-path timeouts down.
name: 07-cnpg-ha-pooler-storm-tuned
technology: postgres-cnpg
group: ha-pooler
cluster:
  context: docker-desktop

infra:
  - operator: cnpg

config:
  manifests: ./manifests

load:
  endpoint: pg-pooler
  clients: {count: 10, mode: persistent}
  phases:
    - {duration: 60s, rate: 20/s, mix: {read: 0.5, write: 0.5}}   # steady baseline
    - {duration: 90s, rate: 100/s, mix: {read: 0.5, write: 0.5},
       clients: {count: 150, mode: persistent}}                    # storm; fault lands mid-phase

faults:
  - at: 90s                       # 30s into the storm — same as the untuned arm
    worker: pod_kill
    target: {role: primary}

verify:
  - integrity

goals:
  - {metric: rto, max: 10s}
  - {metric: rpo, max: 0}
  - {metric: connect_error_rate, max: 1%}
  - {metric: uptime, min: 98%}
  - {metric: write_latency_p99, max: 200ms, window: steady-state}
