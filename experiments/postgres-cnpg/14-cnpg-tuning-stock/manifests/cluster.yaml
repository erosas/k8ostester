# Target architecture with STOCK postgres parameters — the tuning baseline.
# Identical to arm 15 except postgresql.parameters.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
spec:
  instances: 3
  storage:
    size: 3Gi
  resources:
    requests: {cpu: 250m, memory: 512Mi}
    limits: {cpu: "2", memory: 1Gi}
  postgresql:
    synchronous:
      method: any
      number: 1