# The full target architecture with everything enabled: 3 instances with
# quorum sync (1 sync + 1 async semantics via any/1), Barman backups + WAL
# archiving to SeaweedFS (the PITR path under test), tuned failover detection
# (readiness 3s×2 + isolation self-fencing, arm 13's PASS config), and the
# tuned PgBouncer pooler in front.
apiVersion: v1
kind: Secret
metadata:
  name: seaweed-s3
stringData:
  ACCESS_KEY: k8ost
  SECRET_KEY: k8ost-test-secret   # test-only creds, mirrors infra/seaweedfs
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
spec:
  instances: 3
  storage:
    size: 1Gi
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 512Mi}
  postgresql:
    synchronous:
      method: any
      number: 1
  probes:
    readiness:
      periodSeconds: 3
      failureThreshold: 2
    liveness:
      periodSeconds: 3
      timeoutSeconds: 3
      failureThreshold: 2
      isolationCheck:
        enabled: true
        connectionTimeout: 2000
        requestTimeout: 2000
  backup:
    barmanObjectStore:
      destinationPath: s3://backups/${K8OST_NAMESPACE}
      endpointURL: http://seaweedfs.k8ost-infra.svc:8333
      s3Credentials:
        accessKeyId:
          name: seaweed-s3
          key: ACCESS_KEY
        secretAccessKey:
          name: seaweed-s3
          key: SECRET_KEY
      wal:
        compression: gzip
    retentionPolicy: 7d
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pg-pooler
spec:
  cluster:
    name: pg
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "500"
      default_pool_size: "20"
      server_login_retry: "1"
      server_connect_timeout: "3"
      server_fast_close: "1"
      query_wait_timeout: "30"