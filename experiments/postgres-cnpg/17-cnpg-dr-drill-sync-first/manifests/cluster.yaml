# The strict 1-sync + 1-async arm: method first with the sync-candidate list
# capped at ONE standby, so pg-2 is the named sync member and pg-3 is pure
# async (pg_stat_replication reports sync/async — visible on the topology
# edges). Everything else identical to 16-cnpg-dr-drill.
apiVersion: v1
kind: Secret
metadata:
  name: seaweed-s3
stringData:
  ACCESS_KEY: k8ost
  SECRET_KEY: k8ost-test-secret   # test-only creds, mirrors infra/seaweedfs
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
spec:
  instances: 3
  storage:
    size: 1Gi
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 512Mi}
  postgresql:
    synchronous:
      method: first
      number: 1
      maxStandbyNamesFromCluster: 1
  probes:
    readiness:
      periodSeconds: 3
      failureThreshold: 2
    liveness:
      periodSeconds: 3
      timeoutSeconds: 3
      failureThreshold: 2
      isolationCheck:
        enabled: true
        connectionTimeout: 2000
        requestTimeout: 2000
  backup:
    barmanObjectStore:
      destinationPath: s3://backups/${K8OST_NAMESPACE}
      endpointURL: http://seaweedfs.k8ost-infra.svc:8333
      s3Credentials:
        accessKeyId:
          name: seaweed-s3
          key: ACCESS_KEY
        secretAccessKey:
          name: seaweed-s3
          key: SECRET_KEY
      wal:
        compression: gzip
    # Retention prunes base backups + orphaned WAL past this window (see 16's
    # cluster.yaml for the base-cadence vs retention reasoning).
    retentionPolicy: 7d
---
# Periodic base backups (6-field cron; leading field is SECONDS). Inert in a
# short drill; the on-demand backup (verify: backup) is what runs here.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pg-nightly
spec:
  schedule: "0 0 2 * * *"        # 02:00 daily
  backupOwnerReference: self
  method: barmanObjectStore
  cluster:
    name: pg
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pg-pooler
spec:
  cluster:
    name: pg
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "500"
      default_pool_size: "20"
      server_login_retry: "1"
      server_connect_timeout: "3"
      server_fast_close: "1"
      query_wait_timeout: "30"