# Shared read-scaling scenario (referenced via `extends:`). Identical load,
# fault and goals for every read-topology config — writes always hit the
# primary (endpoint auto = pg-rw); each config overrides load.endpoint_ro to
# route READS somewhere different, so the comparison isolates the read path.
#
# The write-latency goal is the interesting one: the -ro path load-balances
# across BOTH replicas incl. the quorum-sync member, so read load there can
# back-pressure commits. This scenario is how we measure whether it does.
technology: postgres-cnpg
group: read-scaling
cluster:
  context: docker-desktop
infra:
  - operator: cnpg
  - chaos-mesh                   # the primary is PARTITIONED (slow failover) so
                                 # the read-offload downtime difference is visible
load:
  endpoint: auto                 # writes -> primary (pg-rw)
  clients: {count: 20, mode: persistent}
  phases:
    - {duration: 45s, rate: 60/s, mix: {read: 0.9, write: 0.1}}   # read-heavy baseline
    - {duration: 75s, rate: 60/s, mix: {read: 0.9, write: 0.1}}   # primary partitioned at +45s
faults:
  # a partition (not a clean kill): detection+promotion takes 15-45s, during
  # which pg-rw has no primary — reads routed there go down too, while reads on
  # the replicas keep succeeding. This is where read offload earns its keep.
  - at: 45s
    worker: network_partition
    target: {role: primary}
    duration: 40s
verify:
  - integrity
goals:
  # the headline: with reads offloaded to replicas they keep succeeding through
  # the primary kill, so downtime/uptime barely move; routing reads at the
  # primary means the kill takes everything down for the promotion window
  - {metric: uptime, min: 95%}
  - {metric: downtime_total, max: 5s}
  - {metric: rpo, max: 0}
  - {metric: read_latency_p99, max: 100ms, window: steady-state}
  - {metric: error_rate, max: 5%}
