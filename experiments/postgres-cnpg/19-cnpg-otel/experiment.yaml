# Example: the DB nodes export their own metrics to an EXTERNAL OTEL endpoint.
# k8ost installs no monitoring stack (D19) — the config under test owns its
# telemetry. manifests/otel-collector.yaml ships an OpenTelemetry Collector
# that scrapes CNPG's built-in Prometheus exporter (:9187) and forwards OTLP
# to YOUR endpoint (set OTEL_EXPORTER_OTLP_ENDPOINT in that file). It is fully
# namespaced, so it deploys and tears down with the run.
name: 19-cnpg-otel
technology: postgres-cnpg
group: examples
cluster:
  context: docker-desktop
infra:
  - operator: cnpg
config:
  manifests: ./manifests
load:
  endpoint: auto
  clients: {count: 5, mode: persistent}
  phases:
    - {duration: 60s, rate: 20/s, mix: {read: 0.5, write: 0.5}}
goals:
  - {metric: write_latency_p99, max: 150ms, window: steady-state}
