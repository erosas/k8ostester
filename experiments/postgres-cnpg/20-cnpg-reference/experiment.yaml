# REFERENCE experiment — exercises the canonical architecture (manifests/) end
# to end: read/write-split load through the poolers, a primary partition (must
# fail over losing nothing), a replica kill (must be a non-event), then verify
# integrity + backup + PITR. This is the "prove the whole design works" run and
# the config you copy for real clusters. See manifests/cluster.yaml for the why.
name: 20-cnpg-reference
technology: postgres-cnpg
cluster:
  context: docker-desktop         # override with --context for a remote cluster

infra:
  - operator: cnpg                # skipped if the operator is already installed
  - seaweedfs                     # in-cluster object store for the backup path

config:
  manifests: ./manifests

# Real apps use a split datasource: writes to the rw pooler, reads to the ro
# pooler (offloaded to replicas). The loadgen models exactly that.
load:
  endpoint: pg-pooler             # writes → rw pooler
  endpoint_ro: pg-pooler-ro       # reads  → ro pooler (replicas)
  clients: {count: 10, mode: persistent}
  phases:
    - {duration: 60s, rate: 20/s, mix: {read: 0.7, write: 0.3}}    # baseline (read-heavy)
    - {duration: 30s, rate: 0/s}                                   # pause: PITR anchor (D13)
    - {duration: 90s, rate: 60/s, mix: {read: 0.7, write: 0.3}}    # load; partition mid-phase
    - {duration: 60s, rate: 20/s, mix: {read: 0.7, write: 0.3}}    # cool-down; replica kill

faults:
  - at: 120s                      # 30s into the load phase; heals at 180s
    worker: network_partition
    duration: 60s
    target: {role: primary}       # prove failover: lose nothing, keep serving
  - at: 210s                      # cool-down: async replica loss must be a non-event
    worker: pod_kill
    target: {role: replica}

verify:
  - integrity                     # every acked write present after the chaos
  - backup                        # a Barman base backup completes to the store
  - pitr                          # a second cluster restored to mid-pause holds exactly
                                  # the pre-pause acked rows — proves the backups are usable

goals:
  - {metric: rto, max: 55s}       # failover within the CNPG bimodal detection window
  - {metric: rpo, max: 0}         # quorum sync ⇒ zero data loss
  - {metric: uptime, min: 75%}
  - {metric: downtime_total, max: 55s}
  - {metric: error_rate, max: 1%}
  - {metric: write_latency_p99, max: 200ms, window: steady-state}
