# ============================================================================
# REFERENCE CONFIG — the canonical "do it this way" CNPG architecture.
# Copy this as the starting point for your own cluster. Every block is a
# deliberate best practice; the comments say why. It brings together, in one
# place, what the numbered experiments each isolate:
#   HA + quorum sync · tuned failover detection · Barman backup + WAL archiving
#   · periodic base backups + retention (PITR) · rw + ro PgBouncer pooling.
# ============================================================================

# Object-store credentials. Here they point at the in-cluster SeaweedFS the
# framework stands up (test-only creds). In production this is your real S3/GCS
# secret, and the bucket must ALREADY EXIST — the operator writes objects, it
# never creates the bucket.
apiVersion: v1
kind: Secret
metadata:
  name: seaweed-s3
stringData:
  ACCESS_KEY: k8ost
  SECRET_KEY: k8ost-test-secret
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
spec:
  # 3 instances = 1 primary + 2 replicas. With quorum sync below, this gives
  # 1 synchronous + 1 asynchronous replica: an async replica going down is a
  # non-event, and failover never loses an acked write.
  instances: 3

  storage:
    size: 1Gi                      # size for your workload; separate WAL volume
    # walStorage:                  # recommended in production: isolate WAL IO
    #   size: 2Gi                  # from data IO on a dedicated volume

  # Always set BOTH requests and limits so the scheduler and QoS behave
  # predictably. Size to your workload; these are lab-scale values.
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 512Mi}

  postgresql:
    # Quorum sync: commit needs 1 of the replicas to ack ("any 1"). RPO = 0 for
    # any single-node failure, while a second replica being down doesn't stall
    # commits. This is the target trade-off (see experiment 16/17).
    synchronous:
      method: any
      number: 1
    parameters:
      max_connections: "200"       # the pooler multiplexes; keep backends bounded

  # Tuned failover detection — the difference between ~14s and a minute of
  # downtime (see experiments 10-13). Readiness flips fast; the liveness
  # isolation check self-fences a partitioned primary so the operator can
  # promote a replica instead of waiting out a reconcile.
  probes:
    readiness:
      periodSeconds: 3
      failureThreshold: 2
    liveness:
      periodSeconds: 3
      timeoutSeconds: 3
      failureThreshold: 2
      isolationCheck:
        enabled: true
        connectionTimeout: 2000
        requestTimeout: 2000

  # Continuous WAL archiving + physical base backups to the object store. WAL
  # archiving starts the moment this block exists (it is what makes PITR to
  # "any point" possible); base backups are taken by the ScheduledBackup below
  # and on demand.
  backup:
    barmanObjectStore:
      destinationPath: s3://backups/${K8OST_NAMESPACE}
      endpointURL: http://seaweedfs.k8ost-infra.svc:8333
      s3Credentials:
        accessKeyId: {name: seaweed-s3, key: ACCESS_KEY}
        secretAccessKey: {name: seaweed-s3, key: SECRET_KEY}
      wal:
        compression: gzip          # WAL is highly compressible — cuts store + egress
    # Barman prunes base backups and their orphaned WAL past this window.
    # Recovery-to-latest replays WAL from the most recent base, so the
    # ScheduledBackup cadence bounds replay time; this bounds rewind distance.
    retentionPolicy: 7d
---
# Periodic base backups. Without this you get WAL archiving but no fresh anchor,
# so a restore replays ever-more WAL and storage grows. Daily is a sane default;
# go to every few hours for high-write DBs to keep replay short.
# NOTE: 6-field cron — the LEADING field is SECONDS (a CNPG-specific gotcha).
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pg-nightly
spec:
  schedule: "0 0 2 * * *"          # 02:00 every day
  backupOwnerReference: self
  method: barmanObjectStore        # or volumeSnapshot (CSI) for large volumes —
                                   # WAL archiving above is still required either way
  cluster:
    name: pg
---
# Read/WRITE pooler. Apps point their write datasource here; PgBouncer in
# transaction mode multiplexes many client connections onto few backends and
# rides failover (tuned low timeouts so a dead primary fails fast, not hangs).
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pg-pooler
spec:
  cluster: {name: pg}
  instances: 2                     # HA the pooler too — 2 replicas behind the service
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "500"
      default_pool_size: "20"
      server_login_retry: "1"
      server_connect_timeout: "3"
      server_fast_close: "1"
      query_wait_timeout: "30"
---
# Read-ONLY pooler. Apps point their read datasource here to offload reads onto
# the replicas (the -ro service load-balances across BOTH replicas, including
# the quorum-sync member). Splitting reads off the primary is the main
# horizontal-read-scaling lever (see experiment 18).
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pg-pooler-ro
spec:
  cluster: {name: pg}
  instances: 2
  type: ro
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "500"
      default_pool_size: "20"
      server_login_retry: "1"
      server_connect_timeout: "3"
      server_fast_close: "1"
      query_wait_timeout: "30"
