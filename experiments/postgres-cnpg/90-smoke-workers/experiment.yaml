# Utility smoke (90-prefix: not part of the experiment progression): proves
# the multi-pod loadgen (load.workers) end-to-end — sharded clients/rate,
# per-pod journals aggregated, integrity across both writers. Short and
# fault-free on purpose; run it after touching the loadgen or its Job plumbing.
name: 90-smoke-workers
technology: postgres-cnpg
cluster:
  context: docker-desktop

infra:
  - operator: cnpg

config:
  manifests: ./manifests

load:
  endpoint: auto
  image: python:3.12-slim   # exercises the load.image override path (D12);
                            # bootstrap detects psycopg is absent and pip-installs
  workers: 2
  clients: {count: 10, mode: persistent}
  phases:
    - {duration: 30s, rate: 40/s, mix: {read: 0.5, write: 0.5}}
    - {duration: 20s, rate: 40/s, mix: {read: 0.5, write: 0.5},
       clients: {count: 21, mode: persistent}}   # odd count: uneven shard split

verify:
  - integrity

goals:
  - {metric: availability, min: 99%}
  - {metric: connect_error_rate, max: 1%}