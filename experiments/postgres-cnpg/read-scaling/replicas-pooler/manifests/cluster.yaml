# Config under test: 3 instances with quorum-based synchronous replication —
# failover target always exists and acked writes are on ≥1 replica (RPO 0).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
spec:
  instances: 3
  storage:
    size: 1Gi
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 512Mi}
  postgresql:
    synchronous:
      method: any
      number: 1
