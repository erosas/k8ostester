# kube-prometheus-stack values (all components Apache 2.0).
# Grafana is AGPL and excluded per D7 — Perses is the dashboard layer.
fullnameOverride: kps
grafana:
  enabled: false
alertmanager:
  enabled: false
prometheus:
  prometheusSpec:
    # discover ALL Pod/ServiceMonitors (CNPG's operator-created PodMonitors
    # don't carry this chart's release label)
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    retention: 7d
    resources:
      requests: {cpu: 100m, memory: 512Mi}
      limits: {memory: 1Gi}
