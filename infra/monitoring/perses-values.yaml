# Perses (Apache 2.0) — the permissive dashboard layer (D7).
# The provisioning ConfigMap (perses-provisioning) supplies the Prometheus
# datasource; Perses loads everything under /etc/perses/provisioning.
volumes:
  - name: provisioning
    configMap:
      name: perses-provisioning
  - name: plugins
    emptyDir: {}    # plugin archives extract here; rootfs is read-only
volumeMounts:
  - name: provisioning
    mountPath: /etc/perses/provisioning
  - name: plugins
    mountPath: /etc/perses/plugins
