# Native full partition: a deny-all NetworkPolicy selecting one pod by a marker
# label k8ost stamps on it. policyTypes covers both directions with no allow
# rules → all ingress and egress to the pod is dropped, the L4 equivalent of
# Chaos Mesh's `partition` action, with zero cluster dependencies.
#
# ENFORCEMENT DEPENDS ON THE CNI: Calico/Cilium enforce it; kindnet (kind /
# docker-desktop default) does NOT — there the object is created but traffic
# is not actually dropped. Use engine: chaos-mesh on such clusters.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: '${NAME}'
  namespace: '${NAMESPACE}'
spec:
  podSelector:
    matchLabels:
      k8ostester.io/partition: '${MARKER}'
  policyTypes:
    - Ingress
    - Egress
