# Load generator Job (D12): stock python image + the loadgen.py ConfigMap.
# Scalars: '${X}'. The phase plan substitutes as a JSON string into K8OST_PHASES.
# An Indexed pool of ${WORKERS} pod(s): each shards the global client count and
# rate by its completion index, so TPS scales by turning one knob (load.workers).
apiVersion: batch/v1
kind: Job
metadata:
  name: k8ost-loadgen
spec:
  backoffLimit: 0
  completionMode: Indexed
  completions: ${WORKERS}
  parallelism: ${WORKERS}
  template:
    metadata:
      labels:
        app: k8ost-loadgen
    spec:
      restartPolicy: Never
      imagePullSecrets: ${PULL_SECRETS}
      containers:
        - name: loadgen
          image: '${IMAGE}'
          command:
            - bash
            - -c
            # idempotent bootstrap: a prebuilt image (load.image, D12) has
            # psycopg baked in and skips pip; the stock image installs it
            - python -c 'import psycopg' 2>/dev/null || pip install --quiet --no-cache-dir '${PSYCOPG_PIN}'; exec python /app/loadgen.py
          env:
            - name: K8OST_DSN
              value: '${DSN}'
            - name: K8OST_DSN_RO
              value: '${DSN_RO}'
            - name: K8OST_PHASES
              value: '${PHASES_JSON}'
            - name: K8OST_WORKERS
              value: '${WORKERS}'
            - name: JOB_COMPLETION_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
          volumeMounts:
            - name: script
              mountPath: /app
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
      volumes:
        - name: script
          configMap:
            name: k8ost-loadgen
