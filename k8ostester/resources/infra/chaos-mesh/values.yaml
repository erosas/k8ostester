# Chaos Mesh (Apache 2.0) — network fault injection engine (D16).
# Minimal footprint: controller + per-node daemon only. The dashboard and the
# DNSChaos server are off — faults are driven declaratively via CRs and
# observed through the run report, not clicked together in a UI.
controllerManager:
  replicaCount: 1

# The kind-style nodes (Docker Desktop kubernetes) run containerd, not docker;
# the daemon must attach to the node's real runtime socket to enter pod netns.
chaosDaemon:
  runtime: containerd
  socketPath: /run/containerd/containerd.sock

dashboard:
  create: false

dnsServer:
  create: false
