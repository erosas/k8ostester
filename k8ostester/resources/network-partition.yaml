# Full network partition: drop every packet to and from the target pod for
# ${DURATION}. Unlike pod_kill the process stays alive — the cluster has to
# *detect* the isolation before it can react, which is the point of the fault.
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: '${NAME}'
  namespace: '${NAMESPACE}'
spec:
  action: partition
  mode: all
  selector:
    pods: ${PODS}
  direction: both
  duration: '${DURATION}'