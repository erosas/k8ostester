<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
  /* always the light palette — reports are shared artifacts and must look
     identical everywhere, regardless of the viewer's OS theme */
  .viz-root {
    --surface-1: #fcfcfb; --page: #f9f9f7;
    --ink-1: #0b0b0b; --ink-2: #52514e; --muted: #898781;
    --grid: #e1e0d9; --axis: #c3c2b7; --ring: rgba(11,11,11,0.10);
    --good: #0ca30c; --critical: #d03b3b;
    --s1: #2a78d6; --s2: #1baf7a; --s3: #eda100; --s4: #008300;
    --s5: #4a3aa7; --s6: #e34948; --s7: #e87ba4; --s8: #eb6834;
  }
  body { margin: 0; background: var(--page); color: var(--ink-1);
         font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif; }
  .viz-root { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--ink-2); margin: 0 0 20px; }
  .card { background: var(--surface-1); border: 1px solid var(--ring);
          border-radius: 8px; padding: 16px; margin: 16px 0; }
  h2 { font-size: 15px; margin: 0 0 10px; font-weight: 600; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin: 0 0 8px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px;
                 color: var(--ink-2); }
  .legend i { display: inline-block; width: 14px; height: 2px; border-radius: 1px; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 10px;
           font-size: 12px; font-weight: 600; }
  .badge.pass { color: var(--good); border: 1px solid var(--good); }
  .badge.fail { color: var(--critical); border: 1px solid var(--critical); }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--grid);
           font-variant-numeric: tabular-nums; }
  th { color: var(--ink-2); font-weight: 600; }
  td .ok { color: var(--good); font-weight: 600; }
  td .bad { color: var(--critical); font-weight: 600; }
  .thr { color: var(--muted); font-size: 12px; }
  .wrap { overflow-x: auto; }
  svg text { fill: var(--muted); font: 11px system-ui, sans-serif; }
  .tip { position: fixed; pointer-events: none; background: var(--surface-1);
         border: 1px solid var(--ring); border-radius: 6px; padding: 8px 10px;
         font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.12); display: none;
         z-index: 10; }
  .tip b { font-variant-numeric: tabular-nums; }
  .tip .k { display: inline-block; width: 12px; height: 2px; margin-right: 6px;
            vertical-align: middle; border-radius: 1px; }
  .tip .row { color: var(--ink-2); }
</style>
<div class="viz-root">
  <h1>__TITLE__</h1>
  <p class="sub" id="sub"></p>
  <div class="card"><h2>Goals</h2><div class="wrap"><table id="matrix"></table></div></div>
  <div class="card"><h2>Successful writes per second</h2>
    <div class="legend" id="legend1"></div><div id="chart-wps"></div></div>
  <div class="card"><h2>Write latency p99 (ms, per second)</h2>
    <div class="legend" id="legend2"></div><div id="chart-p99"></div></div>
  <div class="card"><h2>Failed ops per second (reads, writes and connects)</h2>
    <div class="legend" id="legend3"></div><div id="chart-eps"></div></div>
</div>
<div class="tip" id="tip"></div>
<script>
const DATA = __PAYLOAD__;
const COLORS = ['--s1','--s2','--s3','--s4','--s5','--s6','--s7','--s8'];
const color = i => COLORS[i % COLORS.length];
const css = v => getComputedStyle(document.querySelector('.viz-root')).getPropertyValue(v).trim();
const runs = DATA.runs;

document.getElementById('sub').textContent =
  runs.map(r => `${r.label} — ${r.status.toUpperCase()}`).join('  ·  ');

// goal matrix
{
  const table = document.getElementById('matrix');
  const head = document.createElement('tr');
  head.appendChild(document.createElement('th')).textContent = 'Goal';
  runs.forEach((r, i) => {
    const th = document.createElement('th');
    const key = document.createElement('span');
    key.className = 'k'; key.style.cssText =
      `display:inline-block;width:12px;height:2px;margin-right:6px;vertical-align:middle;background:var(${color(i)})`;
    th.appendChild(key);
    th.appendChild(document.createTextNode(r.name + ' '));
    const b = document.createElement('span');
    b.className = 'badge ' + (r.status === 'passed' ? 'pass' : 'fail');
    b.textContent = r.status.toUpperCase();
    th.appendChild(b);
    head.appendChild(th);
  });
  table.appendChild(head);
  DATA.matrix.forEach(row => {
    const tr = document.createElement('tr');
    tr.appendChild(document.createElement('td')).textContent = row.goal;
    row.cells.forEach(cell => {
      const td = document.createElement('td');
      if (!cell) { td.textContent = '—'; }
      else {
        const mark = document.createElement('span');
        mark.className = cell.passed ? 'ok' : 'bad';
        mark.textContent = (cell.passed ? '✔ ' : '✘ ') + cell.value;
        td.appendChild(mark);
        if (cell.threshold) {
          const thr = document.createElement('span');
          thr.className = 'thr'; thr.textContent = '  (' + cell.threshold + ')';
          td.appendChild(thr);
        }
      }
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });
}

// legends
for (const id of ['legend1', 'legend2', 'legend3']) {
  const el = document.getElementById(id);
  runs.forEach((r, i) => {
    const s = document.createElement('span');
    const key = document.createElement('i');
    key.style.background = `var(${color(i)})`;
    s.appendChild(key); s.appendChild(document.createTextNode(r.name));
    el.appendChild(s);
  });
}

const tip = document.getElementById('tip');

function chart(mountId, field, yLabel) {
  const plotted = runs.filter(r => r.series.length);
  if (!plotted.length) return;
  const W = 900, H = 240, M = {t: 12, r: 12, b: 26, l: 46};
  const iw = W - M.l - M.r, ih = H - M.t - M.b;
  const xMax = Math.max(...plotted.map(r => r.series.at(-1).s)) + 1;
  const yMax = Math.max(...plotted.flatMap(r => r.series.map(p => p[field] ?? 0))) * 1.1 || 1;
  const x = s => M.l + s / xMax * iw;
  const y = v => M.t + ih - v / yMax * ih;
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.style.width = '100%';

  // gridlines + y ticks (4 clean steps)
  const step = niceStep(yMax / 4);
  for (let v = 0; v <= yMax; v += step) {
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', M.l); line.setAttribute('x2', W - M.r);
    line.setAttribute('y1', y(v)); line.setAttribute('y2', y(v));
    line.setAttribute('stroke', css('--grid')); line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', M.l - 6); t.setAttribute('y', y(v) + 4);
    t.setAttribute('text-anchor', 'end');
    t.textContent = v.toLocaleString();
    svg.appendChild(t);
  }
  // x ticks every 30s
  for (let s = 0; s <= xMax; s += 30) {
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', x(s)); t.setAttribute('y', H - 8);
    t.setAttribute('text-anchor', 'middle');
    t.textContent = s + 's';
    svg.appendChild(t);
  }

  // fault markers: each run's faults in that run's color (timelines are only
  // shared within a group; an all-runs report mixes experiments)
  const seenFaultX = new Set();
  runs.forEach((r, i) => {
    r.faults.forEach(f => {
      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', x(f.s)); line.setAttribute('x2', x(f.s));
      line.setAttribute('y1', M.t); line.setAttribute('y2', M.t + ih);
      line.setAttribute('stroke', css(color(i)));
      line.setAttribute('stroke-width', '1');
      line.setAttribute('stroke-dasharray', '3 3');
      const title = document.createElementNS(ns, 'title');
      title.textContent = `${f.label} @ ${f.s}s — ${r.name}`;
      line.appendChild(title);
      svg.appendChild(line);
      const key = Math.round(x(f.s));
      if (runs.length <= 4 && !seenFaultX.has(key)) {  // labels clutter beyond a few runs
        seenFaultX.add(key);
        const t = document.createElementNS(ns, 'text');
        t.setAttribute('x', x(f.s) + 4); t.setAttribute('y', M.t + 10);
        t.textContent = f.label;
        svg.appendChild(t);
      }
    });
  });

  // series lines; a hole in the data (null p99 seconds) breaks the path —
  // bridging a gap would draw data where none exists
  runs.forEach((r, i) => {
    const pts = r.series.filter(p => p[field] != null);
    if (!pts.length) return;
    const d = pts.map((p, j) =>
      `${j && p.s - pts[j - 1].s <= 1 ? 'L' : 'M'}${x(p.s).toFixed(1)},${y(p[field]).toFixed(1)}`
    ).join('');
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', css(color(i)));
    path.setAttribute('stroke-width', '2');
    path.setAttribute('stroke-linejoin', 'round');
    path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path);
  });

  // crosshair + tooltip
  const cross = document.createElementNS(ns, 'line');
  cross.setAttribute('y1', M.t); cross.setAttribute('y2', M.t + ih);
  cross.setAttribute('stroke', css('--axis')); cross.setAttribute('stroke-width', '1');
  cross.style.display = 'none';
  svg.appendChild(cross);

  svg.addEventListener('pointermove', e => {
    const rect = svg.getBoundingClientRect();
    const sx = (e.clientX - rect.left) / rect.width * W;
    const sec = Math.round((sx - M.l) / iw * xMax);
    if (sec < 0 || sec > xMax) { cross.style.display = 'none'; tip.style.display = 'none'; return; }
    cross.setAttribute('x1', x(sec)); cross.setAttribute('x2', x(sec));
    cross.style.display = '';
    tip.textContent = '';
    const head = document.createElement('div');
    head.className = 'row'; head.textContent = `t = ${sec}s`;
    tip.appendChild(head);
    runs.forEach((r, i) => {
      const p = r.series.find(q => q.s === sec);
      const row = document.createElement('div'); row.className = 'row';
      const k = document.createElement('span');
      k.className = 'k'; k.style.background = css(color(i));
      row.appendChild(k);
      const b = document.createElement('b');
      b.textContent = p && p[field] != null ? p[field].toLocaleString() : '–';
      row.appendChild(b);
      row.appendChild(document.createTextNode(' ' + r.name));
      tip.appendChild(row);
    });
    tip.style.display = 'block';
    tip.style.left = Math.min(e.clientX + 14, innerWidth - tip.offsetWidth - 8) + 'px';
    tip.style.top = (e.clientY + 14) + 'px';
  });
  svg.addEventListener('pointerleave', () => {
    cross.style.display = 'none'; tip.style.display = 'none';
  });

  document.getElementById(mountId).appendChild(svg);
}

function niceStep(raw) {
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  for (const m of [1, 2, 5, 10]) if (raw <= m * mag) return m * mag;
  return 10 * mag;
}

chart('chart-wps', 'wps');
chart('chart-p99', 'p99');
chart('chart-eps', 'eps');
</script>
