# PITR verification cluster (D13): bootstrapped from the source cluster's
# object store, recovered to '${TARGET_TIME}' (the mid-run pause).
# STORAGE_JSON / STORE_JSON substitute JSON objects (unquoted placeholders).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: '${RESTORE_NAME}'
spec:
  instances: 1
  storage: ${STORAGE_JSON}
  bootstrap:
    recovery:
      source: source
      recoveryTarget:
        targetTime: '${TARGET_TIME}'
  externalClusters:
    - name: source
      barmanObjectStore: ${STORE_JSON}
