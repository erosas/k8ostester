# Shared Grafana for the k8ostester console (namespace k8os-console), reading the
# shared Prometheus. Ships a COMPARISON dashboard: an `$exp` template variable
# picks experiments, panels overlay them, repeat side-by-side, and a table diffs
# their peak SLOs. This replaces the old custom comparison-report — configurable
# and interactive. Admin creds are test-only (admin/admin).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: k8os-console
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: console
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: k8os-console
data:
  compare.json: |
    {
      "title": "k8ostester — compare experiments",
      "uid": "k8ost-compare",
      "editable": true,
      "refresh": "10s",
      "time": {"from": "now-6h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "exp",
            "label": "experiment",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": {"query": "label_values(app_ops_total, experiment)", "refId": "exp"},
            "multi": true,
            "includeAll": true,
            "current": {"text": "All", "value": "$__all"}
          }
        ]
      },
      "panels": [
        {
          "id": 1, "type": "timeseries", "title": "Throughput by experiment (overlay)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum by (experiment) (rate(app_ops_total{result=\"ok\", experiment=~\"$exp\"}[1m]))", "legendFormat": "{{experiment}}"}
          ]
        },
        {
          "id": 2, "type": "timeseries", "title": "Error rate by experiment (overlay)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum by (experiment) (rate(app_ops_total{result=\"err\", experiment=~\"$exp\"}[1m]))", "legendFormat": "{{experiment}}"}
          ]
        },
        {
          "id": 3, "type": "table", "title": "Peak error rate per experiment (diff)",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "description": "Worst-case error rate over the window, per experiment — the side-by-side diff.",
          "targets": [
            {"expr": "max by (experiment) (rate(app_ops_total{result=\"err\", experiment=~\"$exp\"}[1m]))", "format": "table", "instant": true}
          ]
        },
        {
          "id": 4, "type": "timeseries", "title": "Throughput — $exp",
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 16},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "repeat": "exp", "repeatDirection": "h",
          "targets": [
            {"expr": "sum by (op) (rate(app_ops_total{result=\"ok\", experiment=\"$exp\"}[1m]))", "legendFormat": "{{op}}"}
          ]
        }
      ],
      "schemaVersion": 39,
      "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: k8os-console
spec:
  replicas: 1
  selector:
    matchLabels: {app: grafana}
  template:
    metadata:
      labels: {app: grafana}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          env:
            - {name: GF_SECURITY_ADMIN_USER, value: admin}
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: admin}
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "true"}
            - {name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: Viewer}
          ports:
            - {containerPort: 3000, name: http}
          volumeMounts:
            - {name: provisioning-ds, mountPath: /etc/grafana/provisioning/datasources}
            - {name: provisioning-db, mountPath: /etc/grafana/provisioning/dashboards}
            - {name: dashboard, mountPath: /var/lib/grafana/dashboards}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
      volumes:
        - name: provisioning-ds
          configMap:
            name: grafana-provisioning
            items: [{key: datasource.yaml, path: datasource.yaml}]
        - name: provisioning-db
          configMap:
            name: grafana-provisioning
            items: [{key: dashboards.yaml, path: dashboards.yaml}]
        - name: dashboard
          configMap: {name: grafana-dashboard}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: k8os-console
spec:
  selector: {app: grafana}
  ports:
    - {name: http, port: 3000, targetPort: 3000}
