{{- if .Values.console.basicAuth.enabled }}
{{- if not (and .Values.console.basicAuth.username .Values.console.basicAuth.password) }}
{{- fail "console.basicAuth.enabled requires console.basicAuth.username and console.basicAuth.password" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8ost-console.fullname" . }}-auth
  labels: {{- include "k8ost-console.labels" . | nindent 4 }}
type: Opaque
stringData:
  # consumed by the console as K8OST_BASIC_AUTH ("user:pass")
  auth: {{ printf "%s:%s" .Values.console.basicAuth.username .Values.console.basicAuth.password | quote }}
{{- end }}
