apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8ost-console.fullname" . }}
  labels: {{- include "k8ost-console.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "k8ost-console.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "k8ost-console.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "k8ost-console.sa" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: console
          # in-cluster the console uses its ServiceAccount (no kubeconfig) and binds
          # 0.0.0.0 automatically; the Service + port-forward are the only way in.
          image: {{ include "k8ost-console.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:                    # satisfies the 'restricted' Pod Security Standard
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          args:
            - --port
            - {{ .Values.service.port | quote }}
            {{- with .Values.console.namespace }}
            - --namespace
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.console.cluster }}
            - --cluster
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.console.grafana }}
            - --grafana
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.console.target }}
            - --target
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.console.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          readinessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
