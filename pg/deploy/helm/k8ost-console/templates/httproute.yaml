{{- if .Values.gatewayRoute.enabled }}
{{- if not .Values.gatewayRoute.host }}{{ fail "gatewayRoute.enabled requires gatewayRoute.host (the DNS name)" }}{{- end }}
{{- if not .Values.gatewayRoute.parentRefs }}{{ fail "gatewayRoute.enabled requires gatewayRoute.parentRefs (the Gateway to attach to)" }}{{- end }}
# NOTE: the console has no auth of its own. Enforce authentication on the Gateway
# (or via a route filter / policy your platform applies) before advertising this host.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "k8ost-console.fullname" . }}
  labels: {{- include "k8ost-console.labels" . | nindent 4 }}
spec:
  parentRefs: {{- toYaml .Values.gatewayRoute.parentRefs | nindent 4 }}
  hostnames:
    - {{ .Values.gatewayRoute.host | quote }}
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - name: {{ include "k8ost-console.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
