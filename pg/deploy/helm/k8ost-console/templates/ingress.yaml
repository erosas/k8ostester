{{- if .Values.ingress.enabled }}
{{- if not .Values.ingress.host }}{{ fail "ingress.enabled requires ingress.host (the DNS name)" }}{{- end }}
{{- if and (not .Values.ingress.annotations) (not .Values.console.basicAuth.enabled) (not .Values.ingress.insecureNoAuth) }}
{{- fail "REFUSING to expose the console unauthenticated. It has no login of its own, and this Ingress would put a mutating control plane on a public DNS name. Turn on console.basicAuth (built-in), attach your controller's auth via ingress.annotations (e.g. an OIDC forward-auth), or set ingress.insecureNoAuth=true to do this on purpose." }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "k8ost-console.fullname" . }}
  labels: {{- include "k8ost-console.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      {{- with .Values.ingress.tls.secretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "k8ost-console.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
