# k8ost-console — values. See pg/deploy/helm/k8ost-console/README.md.

image:
  # Point this at your own registry / proxy mirror. Behind an Artifactory/Nexus
  # proxy, mirror the upstream path and set repository to the mirrored path, e.g.
  #   --set image.repository=registry.internal/mirror/k8os-console
  repository: bytestream89/k8os-console
  tag: ""                    # defaults to the chart's appVersion
  pullPolicy: IfNotPresent

# Pull secrets for a private / authenticated registry (create the secret separately).
imagePullSecrets: []
# - name: my-registry-cred

rbac:
  # namespaced  → a Role in the release namespace (operate CNPG clusters there).
  # cluster     → a ClusterRole (operate clusters in every namespace + read nodes).
  scope: namespaced
  # lab: add the create rights the Builder's "Deploy" needs (clusters, secrets,
  # deployments, RBAC, monitoring CRs). Leave false for a pure operator console.
  lab: false

service:
  # ClusterIP by design — by default you reach the console via `kubectl port-forward`,
  # which is itself the auth gate (it already requires Kubernetes RBAC).
  type: ClusterIP
  port: 8700

# --- External exposure (DNS name + TLS at the gateway controller) -------------
# ⚠ THE CONSOLE HAS NO LOGIN OF ITS OWN. Putting it on a DNS name exposes a
# MUTATING control plane (backup, rotate, break-glass, deploy) to anyone who can
# reach that name. Authentication is your gateway controller's job — enforce it
# there (an OIDC/forward-auth extension, or an authenticating proxy in front).
# Both options below are OFF by default, and neither adds auth for you.
#
# TLS terminates at the gateway; the console speaks plain HTTP behind it. The
# gateway must not buffer responses — its /api/stream is Server-Sent Events.

# Gateway API (the vendor-neutral way): attach an HTTPRoute to an existing Gateway
# that owns the TLS listener. Auth is enforced on the Gateway/route by your platform.
gatewayRoute:
  enabled: false
  parentRefs: []             # the Gateway(s) to attach to, e.g.:
  #   - name: web
  #     namespace: infra
  host: ""                   # the DNS name

# Ingress (if you run an Ingress controller instead of the Gateway API):
ingress:
  enabled: false
  className: ""              # your ingress class
  host: ""                   # the DNS name, e.g. k8ost.example.com (required when enabled)
  annotations: {}            # where you attach your controller's auth (e.g. an OIDC forwardAuth)
  tls:
    enabled: true
    secretName: ""           # cert secret (e.g. from cert-manager); "" uses the controller default cert
  # Last resort: expose with NO auth on purpose (don't). Must be set to bypass the guard.
  insecureNoAuth: false

# Optional pre-selection / wiring (all optional — the UI can pick at runtime).
console:
  namespace: ""              # scope the console to one namespace (default: its own)
  cluster: ""                # pre-select a cluster (with namespace)
  grafana: ""                # Grafana base URL for the metrics deep-links
  target: ""                 # a PG image/version to offer as an upgrade
  extraArgs: []              # any additional k8ost-console flags
  # Built-in basic-auth — the console checks it itself, so it works behind
  # port-forward, an Ingress, OR a gateway (controller-agnostic). Off by default:
  # "no auth for now" is the default, flip enabled=true when you want it. It's a
  # shared credential (interim, not SSO), and TLS must terminate at the edge.
  basicAuth:
    enabled: false
    username: ""
    password: ""

serviceAccount:
  name: ""                   # defaults to the release fullname

resources:
  requests: {cpu: 50m, memory: 96Mi}
  limits: {cpu: 500m, memory: 256Mi}

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
