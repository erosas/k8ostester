# The ideal config under test (from 20-cnpg-reference), specialized for the
# testbed golden path:
#   - imageName PINNED to a specific minor, so flow.py's upgrade step is a
#     deterministic bump (16.4 -> 16.6)
#   - BLUE/GREEN credentials: two login roles app_a / app_b, each with its own
#     secret, BOTH members of the object-owning `app` role (so they share access
#     to the tables). A selector config (03-app.yaml) picks the active one.
#     Rotation = refresh the idle role's password, flip the selector, restart —
#     both roles valid throughout, so no failed auth (see flow.py rotate step).
# ---------------------------------------------------------------------------
# One secret per role. Rotation only ever touches the IDLE role's secret.
apiVersion: v1
kind: Secret
type: kubernetes.io/basic-auth
metadata:
  name: app-cred-a
stringData:
  username: app_a
  password: app-a-initial-pw
---
apiVersion: v1
kind: Secret
type: kubernetes.io/basic-auth
metadata:
  name: app-cred-b
stringData:
  username: app_b
  password: app-b-initial-pw
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4   # pinned; flow.py bumps this
  storage:
    size: 1Gi
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 512Mi}

  postgresql:
    synchronous:               # quorum sync: 1 sync + 1 async, RPO 0
      method: any
      number: 1
    parameters:
      max_connections: "200"

  # Blue/green login roles. Both are members of `app` (the CNPG-created owner of
  # the app database) and INHERIT its privileges, so either can read/write the
  # shared tables. Each password is sourced from its own secret; CNPG keeps the
  # role in sync — refreshing a secret is the rotation primitive.
  managed:
    roles:
      - name: app_a
        ensure: present
        login: true
        inRoles: [app]
        passwordSecret: {name: app-cred-a}
      - name: app_b
        ensure: present
        login: true
        inRoles: [app]
        passwordSecret: {name: app-cred-b}

  # Pre-create the table owned by `app` (runs as superuser at bootstrap), so
  # objects belong to the shared owner rather than whichever login role happened
  # to create them — and grant the members what they need.
  bootstrap:
    initdb:
      postInitApplicationSQL:
        - CREATE TABLE IF NOT EXISTS app_writes (id bigserial primary key, ts timestamptz default now(), payload text)
        - ALTER TABLE app_writes OWNER TO app
        - ALTER SEQUENCE app_writes_id_seq OWNER TO app
        - GRANT USAGE, CREATE ON SCHEMA public TO app

  # Tuned failover detection (see experiments 10-13).
  probes:
    readiness: {periodSeconds: 3, failureThreshold: 2}
    liveness:
      periodSeconds: 3
      timeoutSeconds: 3
      failureThreshold: 2
      isolationCheck: {enabled: true, connectionTimeout: 2000, requestTimeout: 2000}

  # Continuous WAL archiving + base backups to the in-testbed SeaweedFS.
  backup:
    barmanObjectStore:
      destinationPath: s3://backups/testbed
      endpointURL: http://seaweedfs.k8os-testbed.svc:8333
      s3Credentials:
        accessKeyId: {name: seaweed-s3, key: ACCESS_KEY}
        secretAccessKey: {name: seaweed-s3, key: SECRET_KEY}
      wal:
        compression: gzip
    retentionPolicy: 7d
---
# Periodic base backups (6-field cron; leading field is SECONDS).
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pg-nightly
spec:
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  method: barmanObjectStore
  cluster: {name: pg}
---
# Read/WRITE pooler (app write datasource).
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pg-pooler
spec:
  cluster: {name: pg}
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "500"
      default_pool_size: "20"
      server_login_retry: "1"
      server_connect_timeout: "3"
      server_fast_close: "1"
      query_wait_timeout: "30"
---
# Read-ONLY pooler (app read datasource → replicas).
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pg-pooler-ro
spec:
  cluster: {name: pg}
  instances: 2
  type: ro
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "500"
      default_pool_size: "20"
      server_login_retry: "1"
      server_connect_timeout: "3"
      server_fast_close: "1"
      query_wait_timeout: "30"
