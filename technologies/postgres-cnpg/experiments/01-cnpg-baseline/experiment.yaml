# Experiment 1: single-instance CNPG with Barman backups to SeaweedFS.
# Happy path (no faults): proves load + integrity + backup + PITR end-to-end.
# The 10s zero-rate pause between the phases is the PITR restore target.
name: 01-cnpg-baseline
technology: postgres-cnpg
cluster:
  context: docker-desktop

infra:
  - operator: cnpg
  - seaweedfs

config:
  manifests: ./manifests

load:
  endpoint: auto                 # the cluster's -rw service
  clients: {count: 5, mode: persistent}
  phases:
    - {duration: 60s, rate: 20/s, mix: {read: 0.5, write: 0.5}}
    - {duration: 10s, rate: 0/s}                                  # pause → PITR target
    - {duration: 45s, rate: 40/s, mix: {read: 0.3, write: 0.7}}

verify:
  - integrity                    # every acked write present with matching checksum
  - backup                       # Barman base backup completed
  - pitr                         # restore to the pause; exact row-set match

goals: []                        # goal evaluation lands in phase 3
