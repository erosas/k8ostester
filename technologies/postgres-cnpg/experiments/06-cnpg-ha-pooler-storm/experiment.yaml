# The combined story: 3-instance sync HA cluster behind PgBouncer, primary
# killed 30s INTO a 150-client connection storm. Tests whether the full
# stack (pooler multiplexing + sync failover) holds every goal at once.
name: 06-cnpg-ha-pooler-storm
technology: postgres-cnpg
group: ha-pooler
cluster:
  context: docker-desktop

infra:
  - operator: cnpg

config:
  manifests: ./manifests

load:
  endpoint: pg-pooler
  clients: {count: 10, mode: persistent}
  phases:
    - {duration: 60s, rate: 20/s, mix: {read: 0.5, write: 0.5}}   # steady baseline
    - {duration: 90s, rate: 100/s, mix: {read: 0.5, write: 0.5},
       clients: {count: 150, mode: persistent}}                    # storm; fault lands mid-phase

faults:
  - at: 90s                       # 30s into the storm
    worker: pod_kill
    target: {role: primary}

verify:
  - integrity

goals:
  - {metric: rto, max: 10s}
  - {metric: rpo, max: 0}
  - {metric: connect_error_rate, max: 1%}
  - {metric: uptime, min: 98%}
  - {metric: write_latency_p99, max: 200ms, window: steady-state}
