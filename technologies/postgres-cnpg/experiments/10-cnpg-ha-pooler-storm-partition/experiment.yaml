# Fault-variant of 07-cnpg-ha-pooler-storm-tuned (same group → same graphs):
# identical architecture, load and goals — but instead of killing the primary
# we PARTITION it for 60s mid-storm. A kill is announced to the cluster (pod
# gone, endpoints updated); a partition must be *detected* (probes, replication
# timeouts) before failover starts, so this arm measures detection latency —
# the classic gray failure the pod_kill arms can't see.
name: 10-cnpg-ha-pooler-storm-partition
technology: postgres-cnpg
group: ha-pooler
cluster:
  context: docker-desktop

infra:
  - operator: cnpg
  - chaos-mesh

config:
  manifests: ./manifests

load:
  endpoint: pg-pooler
  clients: {count: 10, mode: persistent}
  phases:
    - {duration: 60s, rate: 20/s, mix: {read: 0.5, write: 0.5}}   # steady baseline
    - {duration: 90s, rate: 100/s, mix: {read: 0.5, write: 0.5},
       clients: {count: 150, mode: persistent}}                    # storm; fault lands mid-phase
    - {duration: 60s, rate: 20/s, mix: {read: 0.5, write: 0.5}}   # cool-down: observe the heal
                                                                   # (partition lifts at t=150s)

faults:
  - at: 90s                       # 30s into the storm — same offset as the pod_kill arms
    worker: network_partition
    duration: 60s                 # heals at 150s, inside the cool-down phase
    target: {role: primary}

verify:
  - integrity

goals:  # partition-class SLOs (D18, revised): CNPG partition detection is BIMODAL —
        # the readiness transition is either caught immediately (~14s to failover
        # decision) or missed and picked up by the operator's ~30s reconcile requeue
        # (~44s). Observed across 7 runs: 18.7-22.5s x5, 45.5/49.9s x2, operator-log
        # verified. SLOs must hold in BOTH modes or the verdict is a coin toss.
  - {metric: rto, max: 55s}
  - {metric: rpo, max: 0}
  - {metric: uptime, min: 75%}
  - {metric: downtime_total, max: 55s}
  - {metric: write_latency_p99, max: 200ms, window: steady-state}
