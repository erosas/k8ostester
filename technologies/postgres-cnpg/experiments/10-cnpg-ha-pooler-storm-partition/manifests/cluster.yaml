# Identical config to 07-cnpg-ha-pooler-storm-tuned — this arm varies the FAULT
# (network partition instead of pod kill), not the config, so any verdict
# difference against the tuned arm is attributable to the fault type alone.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
spec:
  instances: 3
  storage:
    size: 1Gi
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 512Mi}
  postgresql:
    synchronous:
      method: any
      number: 1
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pg-pooler
spec:
  cluster:
    name: pg
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "500"
      default_pool_size: "20"
      server_login_retry: "1"
      server_connect_timeout: "3"
      server_fast_close: "1"
      query_wait_timeout: "30"
