# Config-variant of 10-cnpg-ha-pooler-storm-partition (same group → same graphs):
# identical architecture, load, fault and goals — only CNPG's failover
# *detection* parameters differ. The untuned arm's RTO was 35.7s, which is the
# default livenessProbeTimeout (30s) plus promotion; this arm tightens the
# liveness probe and enables the primary isolation check so a partitioned
# primary is detected (and self-fences) in seconds instead of half a minute —
# the same story as server_login_retry was for the pod_kill arms.
name: 11-cnpg-ha-pooler-storm-partition-tuned
technology: postgres-cnpg
group: ha-pooler
cluster:
  context: docker-desktop

infra:
  - operator: cnpg
  - chaos-mesh

config:
  manifests: ./manifests

load:
  endpoint: pg-pooler
  clients: {count: 10, mode: persistent}
  phases:
    - {duration: 60s, rate: 20/s, mix: {read: 0.5, write: 0.5}}   # steady baseline
    - {duration: 90s, rate: 100/s, mix: {read: 0.5, write: 0.5},
       clients: {count: 150, mode: persistent}}                    # storm; fault lands mid-phase
    - {duration: 60s, rate: 20/s, mix: {read: 0.5, write: 0.5}}   # cool-down: observe the heal

faults:
  - at: 90s                       # same offset and duration as the untuned arm
    worker: network_partition
    duration: 60s
    target: {role: primary}

verify:
  - integrity

goals:  # partition-class SLOs (D18), calibrated from measured data: CNPG's tuned
        # detection floor is ~15-20s (arm 13), so rto 10s was pod_kill-calibrated
        # fantasy. Op-count availability is blind with pooled clients (scored 100%
        # through a 40.6s outage) -> time-bucketed uptime. Whole-run
        # connect_error_rate only counts the retry storm during the outage
        # (80-90% regardless of config) -> dropped; rto + uptime carry that signal.
  - {metric: rto, max: 25s}
  - {metric: rpo, max: 0}
  - {metric: uptime, min: 88%}
  - {metric: write_latency_p99, max: 200ms, window: steady-state}
