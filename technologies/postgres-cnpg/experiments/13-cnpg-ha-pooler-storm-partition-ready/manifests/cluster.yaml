# Same architecture as arms 10-12; the change under test is the READINESS
# probe (3s × 2 ≈ 6s detection) — the condition CNPG's failover actually
# watches ("Current primary isn't healthy" fired at fault+30s in arms 10/12,
# the readiness default). Liveness and isolationCheck stay at arm 12's
# balanced values; PgBouncer keeps the tuned failover-path parameters.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
spec:
  instances: 3
  storage:
    size: 1Gi
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 512Mi}
  postgresql:
    synchronous:
      method: any
      number: 1
  probes:
    readiness:
      periodSeconds: 3
      failureThreshold: 2
    liveness:
      periodSeconds: 3
      timeoutSeconds: 3
      failureThreshold: 2
      isolationCheck:
        enabled: true
        connectionTimeout: 2000
        requestTimeout: 2000
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pg-pooler
spec:
  cluster:
    name: pg
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "500"
      default_pool_size: "20"
      server_login_retry: "1"
      server_connect_timeout: "3"
      server_fast_close: "1"
      query_wait_timeout: "30"