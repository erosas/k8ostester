# Tuning comparison, tuned arm (group pg-tuning): identical architecture,
# load and goals as 14-cnpg-tuning-stock — ONLY postgresql.parameters differ
# (shared_buffers, WAL/checkpoint tuning). k8ost report --group pg-tuning
# shows what the tuning is worth in TPC-B tps and p99.
name: 15-cnpg-tuning-wal
technology: postgres-cnpg
group: pg-tuning
cluster:
  context: docker-desktop

infra:
  - operator: cnpg

config:
  manifests: ./manifests

load:
  endpoint: auto              # straight at -rw: throughput path, no pooler
  runner: pgbench
  params: {scale: 20}         # ~320MB dataset — I/O bound past shared_buffers
  clients: {count: 16}
  phases:
    - {duration: 90s}         # unthrottled: measure the ceiling

goals:                        # identical to the stock arm — the comparison is the point
  - {metric: tps, min: 200}
  - {metric: write_latency_p99, max: 150ms}