# Experiment: 3-instance CNPG with synchronous replication under the SAME
# primary kill, load, and goals as cnpg-single (D2). EXPECTED TO PASS —
# a sync replica is promoted within seconds and no acked write is lost.
name: cnpg-ha-3node
technology: postgres-cnpg
cluster:
  context: docker-desktop

infra:
  - operator: cnpg

config:
  manifests: ./manifests

load:
  endpoint: auto
  clients: {count: 5, mode: persistent}
  phases:
    - {duration: 150s, rate: 20/s, mix: {read: 0.3, write: 0.7}}

faults:
  - at: 60s
    worker: pod_kill
    target: {role: primary}

verify:
  - integrity

goals:
  - {metric: rto, max: 10s}
  - {metric: rpo, max: 0}
  - {metric: availability, min: 98%}
  - {metric: write_latency_p99, max: 150ms, window: steady-state}
